services:
  postgres:
    image: postgres:17-alpine
    container_name: aurasentry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aurasentry}
      POSTGRES_USER: ${POSTGRES_USER:-aurasentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurasentry}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurasentry} -d ${POSTGRES_DB:-aurasentry}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
    driver: local
    name: aurasentry-pgdata-v17
