spring.application.name=aura-sentry-core

# ──────────────────────────────────────────────
# PostgreSQL Datasource
#
# Local dev   : .env sets POSTGRES_HOST, POSTGRES_PORT, POSTGRES_DB
# Docker      : docker-compose overrides via SPRING_DATASOURCE_URL
# Test        : AbstractIntegrationTest provides a @ServiceConnection
# ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:aurasentry}
spring.datasource.username=${POSTGRES_USER:aurasentry}
spring.datasource.password=${POSTGRES_PASSWORD:aurasentry}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP – logs the effective connection parameters on startup
spring.datasource.hikari.connection-timeout=10000
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG

# ──────────────────────────────────────────────
# JPA / Hibernate – Schema Management
# ──────────────────────────────────────────────
#   Flyway manages the schema → Hibernate only validates.
#   remove 'validate' and switch to 'update' during early development
#   if you edit entities without writing migration scripts.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ── SQL logging – enables diagnosis of DDL / DML execution ──
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ── Log DDL statements separately for troubleshooting ──
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.tool.schema.internal=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
# ──────────────────────────────────────────────
# Flyway – Production-grade versioned migrations
# ──────────────────────────────────────────────
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=true → allows Flyway to start on a non-empty DB
#                            (e.g. after ddl-auto=update was used once)
spring.flyway.baseline-on-migrate=true
# baseline-version=0 ensures V1 is never skipped when baselining occurs
spring.flyway.baseline-version=0
# Log every migration step clearly
logging.level.org.flywaydb=INFO

# Hot reload for static resources and Thymeleaf templates during development
spring.web.resources.cache.period=0
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.web.resources.static-locations=file:src/main/resources/static/
# ──────────────────────────────────────────────
# Azure Service Principal Credentials
# IMPORTANT: Never commit real secrets to version control!
# Use environment variables or an external secret manager (e.g. Azure Key Vault).
# ──────────────────────────────────────────────
azure.tenant-id=${AZURE_TENANT_ID:}
azure.client-id=${AZURE_CLIENT_ID:}
azure.client-secret=${AZURE_CLIENT_SECRET:}
azure.subscription-id=${AZURE_SUBSCRIPTION_ID:}

# ──────────────────────────────────────────────
# Virtual Threads (Spring Boot 4 / Java 25)
# ──────────────────────────────────────────────
spring.threads.virtual.enabled=true

# ──────────────────────────────────────────────
# Session Management
# ──────────────────────────────────────────────
# Invalidate sessions after 30 minutes of inactivity
server.servlet.session.timeout=30m

# ──────────────────────────────────────────────
# Jackson JSON serialisation
# ──────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null

# ──────────────────────────────────────────────
# AuraSentry AI Advisor – Google Gemini API
# IMPORTANT: Never commit real API keys to version control!
# Set via environment variable GEMINI_API_KEY (see below).
# ──────────────────────────────────────────────
gemini.api-key=${GEMINI_API_KEY:}
gemini.model.id=${GEMINI_MODEL_ID:gemini-3.1-flash-lite}
gemini.request.timeout-ms=30000

# ──────────────────────────────────────────────
# AuraSentry FinOps & Cost Governance
# ──────────────────────────────────────────────
# Pricing Engine configuration – base prices in USD.
# Override any value to calibrate estimates to your Azure pricing.
# When no value is configured the hardcoded defaults are used.
# ──────────────────────────────────────────────
aura-sentry.pricing.enabled=true
aura-sentry.pricing.default-currency=USD
aura-sentry.pricing.default-unknown-cost=5.0

# Regional multipliers (West Europe = 1.0 baseline)
aura-sentry.pricing.region-multipliers.westeurope=1.0
aura-sentry.pricing.region-multipliers.northeurope=0.95
aura-sentry.pricing.region-multipliers.eastus=0.90
aura-sentry.pricing.region-multipliers.westus=0.95
aura-sentry.pricing.region-multipliers.eastus2=0.90
aura-sentry.pricing.region-multipliers.centralus=0.88
aura-sentry.pricing.region-multipliers.japaneast=1.15
aura-sentry.pricing.region-multipliers.eastasia=1.10
aura-sentry.pricing.region-multipliers.southeastasia=1.05
aura-sentry.pricing.region-multipliers.australiaeast=1.10
aura-sentry.pricing.region-multipliers.brazilsouth=1.20

# Storage rates (USD per GB)
aura-sentry.pricing.storage-rates.PREMIUM=0.15
aura-sentry.pricing.storage-rates.GRS=0.035
aura-sentry.pricing.storage-rates.LRS=0.023

# Compute rates (USD per month)
aura-sentry.pricing.compute-rates._B1=15.0
aura-sentry.pricing.compute-rates._B2=30.0
aura-sentry.pricing.compute-rates._D2=95.0
aura-sentry.pricing.compute-rates._D4=190.0
aura-sentry.pricing.compute-rates._D8=380.0
aura-sentry.pricing.compute-rates._E4=290.0
aura-sentry.pricing.compute-rates._E8=580.0

# Database rates (USD per month)
aura-sentry.pricing.database-rates.B_=30.0
aura-sentry.pricing.database-rates.GP_=200.0
aura-sentry.pricing.database-rates.MO_=400.0

# Network rates (USD per month)
aura-sentry.pricing.network-rates.dynamic=0.0
aura-sentry.pricing.network-rates.static=3.0
aura-sentry.pricing.network-rates.standard=16.0

# Disk rates (USD per month)
aura-sentry.pricing.disk-rates.ULTRA=200.0
aura-sentry.pricing.disk-rates.PREMIUM=35.0
aura-sentry.pricing.disk-rates.STANDARD=16.0

# ──────────────────────────────────────────────
# Application Security
# ──────────────────────────────────────────────
# Application password (use BCrypt hash starting with $2a$ or $2b$ in production)
app.password=${APP_PASSWORD:changeme}

# ──────────────────────────────────────────────
# AuraSentry Encryption
# ──────────────────────────────────────────────
# 32-byte (256-bit) Base64-encoded key for AES-256-GCM credential encryption
# Generate one with: openssl rand -base64 32
# IMPORTANT: Never commit the real key to version control!
app.encryption.key=${APP_ENCRYPTION_KEY}

# ──────────────────────────────────────────────
# Actuator – Health, Metrics & Prometheus
# ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
