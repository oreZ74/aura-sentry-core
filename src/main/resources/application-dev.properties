# ──────────────────────────────────────────────
# Development Profile Overrides
# Activated via: SPRING_PROFILES_ACTIVE=dev
#                or --spring.profiles.active=dev
# ──────────────────────────────────────────────

# ── SQL logging – full DDL / DML visibility for troubleshooting ──
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.tool.schema=DEBUG

# ── Hot reload for static resources and Thymeleaf templates ──
spring.web.resources.cache.period=0
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.web.resources.static-locations=file:src/main/resources/static/

# ── HikariCP – connection pool diagnostics ──
logging.level.com.zaxxer.hikari=DEBUG
