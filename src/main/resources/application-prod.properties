# ──────────────────────────────────────────────
# Production Profile Overrides
# Activated via SPRING_PROFILES_ACTIVE=prod
# ──────────────────────────────────────────────

# Thymeleaf – load templates from classpath (inside JAR), enable caching
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.cache=true
spring.web.resources.static-locations=classpath:/static/

# JPA / Hibernate – validate schema against entities (Flyway manages it)
spring.jpa.hibernate.ddl-auto=validate

# Flyway – enable versioned migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Disable verbose SQL logging in production
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.org.hibernate.tool.schema=WARN
