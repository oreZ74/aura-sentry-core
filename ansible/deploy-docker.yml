---
# ============================================================
# AuraSentry – Playbook: Deployment on Linux Server (Azure VM)
# ============================================================
# This playbook automates the full deployment of the
# AuraSentry application (Spring Boot + PostgreSQL) on a
# remote Linux server via Docker Compose.
#
# Prerequisites on the target server:
#   - Docker + Docker Compose Plugin installed
#   - SSH access with sudo privileges
#   - Python 3 + community.docker collection:
#       ansible-galaxy collection install community.docker
#
# Run:
#   ansible-playbook ansible/deploy-docker.yml \
#     -i "YOUR_SERVER_IP," \
#     --private-key ~/.ssh/aurasentry_key \
#     --ask-vault-pass
# ============================================================

- name: Deploy AuraSentry on Remote Linux Server
  hosts: aurasentry_servers
  become: true
  gather_facts: true

  vars_files:
    - group_vars/all.yml
    # - group_vars/secrets.yml  # encrypted with ansible-vault

  tasks:
    # ── 1. Prepare system ─────────────────────────────────
    - name: Update OS packages
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
          - python3-docker
        state: present
      when: ansible_os_family == "Debian"

    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    # ── 2. Set up application user and directory ──────────
    - name: Create system user for AuraSentry
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        groups: docker
        append: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"

    # ── 3. Deploy configuration files ─────────────────────
    - name: Transfer docker-compose.yml to server
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"

    - name: Generate .env file from vault variables
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/env.j2"
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"

    # ── 4. Start containers ────────────────────────────────
    - name: Stop existing AuraSentry deployment (if present)
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: absent
      ignore_errors: true

    - name: Pull latest Docker image
      community.docker.docker_image:
        name: "{{ app_image }}:{{ app_version }}"
        source: pull
        force_source: true

    - name: Start AuraSentry via Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        pull: always
      register: compose_result

    - name: Print deployment status
      ansible.builtin.debug:
        msg: "AuraSentry deployed successfully. Services: {{ compose_result.services | default('n/a') }}"

    # ── 5. Health check ────────────────────────────────────
    - name: Wait for Actuator health endpoint to respond
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/actuator/health"
        return_content: true
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 12
      delay: 10

    - name: Application is ready
      ansible.builtin.debug:
        msg: "AuraSentry is reachable at http://{{ ansible_host }}:{{ app_port }}"
